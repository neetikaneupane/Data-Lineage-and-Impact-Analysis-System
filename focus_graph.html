        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ffffff", "font": {"color": "white"}, "id": "raw_customers.email", "label": "raw_customers.email", "shape": "dot", "size": 25, "title": "raw_customers.email"}, {"color": "#e5c07b", "font": {"color": "white"}, "id": "stg_customers.email", "label": "stg_customers.email", "shape": "dot", "size": 15, "title": "stg_customers.email"}, {"color": "#61afef", "font": {"color": "white"}, "id": "dim_customers.email", "label": "dim_customers.email", "shape": "dot", "size": 15, "title": "dim_customers.email"}, {"color": "#c678dd", "font": {"color": "white"}, "id": "rpt_churn_risk.email", "label": "rpt_churn_risk.email", "shape": "dot", "size": 15, "title": "rpt_churn_risk.email"}, {"color": "#61afef", "font": {"color": "white"}, "id": "fct_orders.customer_email", "label": "fct_orders.customer_email", "shape": "dot", "size": 15, "title": "fct_orders.customer_email"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#888888", "from": "raw_customers.email", "title": "07_stg_customers.sql", "to": "stg_customers.email"}, {"arrows": "to", "color": "#888888", "from": "stg_customers.email", "title": "12_dim_customers.sql", "to": "dim_customers.email"}, {"arrows": "to", "color": "#888888", "from": "dim_customers.email", "title": "22_rpt_churn_risk.sql", "to": "rpt_churn_risk.email"}, {"arrows": "to", "color": "#888888", "from": "stg_customers.email", "title": "14_fct_orders.sql", "to": "fct_orders.customer_email"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -8000,
            "springConstant": 0.001,
            "springLength": 180
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>

<script type="text/javascript">
function doSearch(val) {
    var query = val.toLowerCase().trim();
    if (!query) { clearSearch(); return; }
    var allNodes = network.body.data.nodes.get();
    var updates = [];
    allNodes.forEach(function(node) {
        var label = (node.title || node.id || "").toLowerCase();
        var match = label.indexOf(query) !== -1;
        updates.push({
            id:    node.id,
            color: match ? {background:"#ffffff",border:"#ffffff"} : {background:"#2a2a3e",border:"#2a2a3e"},
            font:  match ? {color:"#000000",size:16} : {color:"#2a2a3e",size:10},
            size:  match ? 28 : 6
        });
    });
    network.body.data.nodes.update(updates);
}

function clearSearch() {
    document.getElementById("searchBox").value = "";
    var allNodes = network.body.data.nodes.get();
    var updates = [];
    allNodes.forEach(function(node) {
        updates.push({
            id:    node.id,
            color: node.color,
            font:  {color:"white", size:14},
            size:  node.size || 15
        });
    });
    network.body.data.nodes.update(updates);
}

network.on("click", function(params) {
    if (params.nodes.length === 0) return;

    var nodeId   = params.nodes[0];
    var nodeData = network.body.data.nodes.get(nodeId);
    var allEdges = network.body.data.edges.get();

    var upstream   = 0;
    var downstream = 0;
    var scripts    = new Set();

    allEdges.forEach(function(edge) {
        if (edge.to === nodeId)   { upstream++;   if (edge.title) scripts.add(edge.title); }
        if (edge.from === nodeId) { downstream++; if (edge.title) scripts.add(edge.title); }
    });

    var name  = nodeId;
    var layer = "other";
    if (name.startsWith("raw_"))             layer = "raw (source)";
    else if (name.startsWith("stg_"))        layer = "stg (staging)";
    else if (name.startsWith("dim_"))        layer = "dim (warehouse)";
    else if (name.startsWith("fct_"))        layer = "fct (warehouse)";
    else if (name.startsWith("mrt_"))        layer = "mrt (mart)";
    else if (name.startsWith("rpt_"))        layer = "rpt (report)";

    var scriptList = Array.from(scripts).map(function(s) {
        return "<div style='color:#98c379; font-size:11px;'>" + s + "</div>";
    }).join("");

    document.getElementById("detailContent").innerHTML =
        "<div><b>Name:</b> " + name + "</div>" +
        "<div><b>Layer:</b> " + layer + "</div>" +
        "<div><b>Upstream edges:</b> " + upstream + "</div>" +
        "<div><b>Downstream edges:</b> " + downstream + "</div>" +
        "<div style='margin-top:6px;'><b>SQL files:</b></div>" +
        (scriptList || "<div style='color:#888;'>none</div>");

    document.getElementById("detailPanel").style.display = "block";
});
</script>
